<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ClaudeChrome</title>
  <link rel="icon" type="image/png" href="../branding/logo.png">
  <link rel="stylesheet" href="xterm.css">
  <link rel="stylesheet" href="panel.css">
  <link rel="stylesheet" href="config-panel.css">
</head>
<body>
  <div id="panel-shell">
    <div id="toolbar">
      <div class="toolbar-cluster toolbar-brand-cluster">
        <img class="toolbar-brand-logo" src="../branding/logo.svg" alt="ClaudeChrome 标志">
        <span class="toolbar-brand-name">ClaudeChrome</span>
      </div>

      <div class="toolbar-cluster toolbar-status-cluster">
        <span id="status-indicator" class="disconnected"></span>
        <span id="status-text">未连接</span>
        <span id="focused-binding" class="toolbar-chip">未选中面板</span>
      </div>

      <div class="toolbar-cluster toolbar-action-cluster">
        <button id="btn-launch-defaults" title="设置 Claude 和 Codex 面板的默认启动选项">默认启动项</button>
        <button id="btn-add-shell-pane" title="在当前工作区中添加一个终端面板">+ 终端</button>
        <button id="btn-add-claude-pane" title="在当前工作区中添加一个 Claude 面板">+ Claude</button>
        <button id="btn-add-codex-pane" title="在当前工作区中添加一个 Codex 面板">+ Codex</button>
      </div>

      <div class="toolbar-cluster toolbar-connection-cluster">
        <label id="ws-port-label" for="ws-port">端口</label>
        <input id="ws-port" type="number" min="1" max="65535" inputmode="numeric" value="9999">
        <button id="btn-apply-port" title="保存端口并重新连接">应用</button>
        <button id="btn-reconnect" title="重新连接">↻</button>
      </div>

      <div class="toolbar-cluster toolbar-layout-cluster">
        <button id="btn-theme-toggle" type="button" title="切换浅色或深色主题">&#9788;</button>
        <button id="btn-toggle-panel" type="button" title="关闭当前窗口的侧边栏">关闭侧边栏</button>
      </div>
    </div>

    <div id="shell">
      <div id="workspace-stage"></div>
      <button id="workspace-rail-edge-toggle" class="edge-toggle workspace-edge-toggle" type="button" title="展开工作区列表">
        工作区
      </button>
      <div id="workspace-rail-resizer" aria-hidden="true"></div>
      <aside id="workspace-rail"></aside>
    </div>
  </div>

  <div id="config-panel-overlay" class="config-overlay" style="display: none;">
    <div class="config-panel">
      <div class="config-header">
        <h2>配置面板</h2>
        <button id="config-close" class="config-close-btn" title="关闭">&times;</button>
      </div>

      <div class="config-content">
        <div class="config-tabs">
          <button class="config-tab active" data-tab="defaults">默认启动项</button>
          <button class="config-tab" data-tab="advanced">高级选项</button>
        </div>

        <div class="config-tab-content" id="tab-defaults">
          <div class="config-section">
            <h3>Claude 默认配置</h3>

            <div class="config-field">
              <label for="claude-launch-args">启动参数</label>
              <input type="text" id="claude-launch-args" placeholder="例如: -m opus">
              <span class="config-hint">Claude 面板的默认启动参数</span>
            </div>

            <div class="config-field">
              <label for="claude-working-dir">工作目录</label>
              <input type="text" id="claude-working-dir" placeholder="留空使用当前标签页目录">
              <span class="config-hint">指定 Claude 的默认工作目录</span>
            </div>

            <div class="config-field">
              <label for="claude-prompt-mode">系统提示模式</label>
              <select id="claude-prompt-mode">
                <option value="default">默认</option>
                <option value="custom">自定义</option>
                <option value="none">无</option>
              </select>
              <span class="config-hint">选择系统提示的注入方式</span>
            </div>

            <div class="config-field" id="claude-custom-prompt-field" style="display: none;">
              <label for="claude-custom-prompt">自定义系统提示</label>
              <textarea id="claude-custom-prompt" rows="4" placeholder="输入自定义系统提示..."></textarea>
            </div>
          </div>

          <div class="config-section">
            <h3>Codex 默认配置</h3>

            <div class="config-field">
              <label for="codex-launch-args">启动参数</label>
              <input type="text" id="codex-launch-args" placeholder="例如: -a never -s workspace-write">
              <span class="config-hint">Codex 面板的默认启动参数</span>
            </div>

            <div class="config-field">
              <label for="codex-working-dir">工作目录</label>
              <input type="text" id="codex-working-dir" placeholder="留空使用当前标签页目录">
              <span class="config-hint">指定 Codex 的默认工作目录</span>
            </div>

            <div class="config-field">
              <label for="codex-prompt-mode">系统提示模式</label>
              <select id="codex-prompt-mode">
                <option value="default">默认</option>
                <option value="custom">自定义</option>
                <option value="none">无</option>
              </select>
              <span class="config-hint">选择系统提示的注入方式</span>
            </div>

            <div class="config-field" id="codex-custom-prompt-field" style="display: none;">
              <label for="codex-custom-prompt">自定义系统提示</label>
              <textarea id="codex-custom-prompt" rows="4" placeholder="输入自定义系统提示..."></textarea>
            </div>
          </div>
        </div>

        <div class="config-tab-content" id="tab-advanced" style="display: none;">
          <div class="config-section">
            <h3>高级选项</h3>
            <p class="config-placeholder">高级配置选项将在后续版本中添加</p>
          </div>
        </div>
      </div>

      <div class="config-footer">
        <button id="config-reset" class="config-btn config-btn-secondary">重置为默认</button>
        <button id="config-save" class="config-btn config-btn-primary">保存</button>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
